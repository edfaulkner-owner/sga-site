<div class="page active">
  <div class="page-header">
    <h2 class="page-title">Submit an Entry</h2>
    <div class="page-sub">Contribute to the Archive</div>
  </div>
  <div class="submit-container">
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Your Name</label><input type="text" class="form-input" placeholder="Full name"></div>
      <div class="form-group"><label class="form-lbl">Email Address</label><input type="email" class="form-input" placeholder="your@email.com"></div>
    </div>
    <div class="form-group">
      <label class="form-lbl">Entry Type</label>
      <select class="form-select form-input">
        <option value="">Select type...</option>
        <option>Sticker Set</option><option>Trading Card Pack</option>
        <option>Wild Specimen</option><option>Vending Machine</option><option>Rare / Miscellaneous</option>
      </select>
    </div>
    <div class="form-group"><label class="form-lbl">Description</label><textarea class="form-input form-textarea" placeholder="Describe the item, condition, date, notable characteristics..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-lbl">Location (City, State)</label><input type="text" class="form-input" placeholder="e.g. Tullytown, PA"></div>
      <div class="form-group"><label class="form-lbl">Date Found / Acquired</label><input type="date" class="form-input"></div>
    </div>
    <div class="form-group">
      <label class="form-lbl">Upload Image (Optional)</label>
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">&#128206;</div>
        <div class="upload-txt">Click to choose file or drag and drop</div>
        <div style="font-size:0.8rem;color:#3d3528;margin-top:4px;">JPG, PNG, WEBP up to 10MB</div>
      </div>
      <input type="file" id="file-input" style="display:none" accept="image/*">
    </div>
    <button class="submit-btn">Submit Entry to Archive</button>
  </div>
</div>
